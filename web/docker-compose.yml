services:
  postgres:
    image: postgres:16-alpine
    container_name: project_zen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mdm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mdm_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-mdm_lite}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mdm} -d ${POSTGRES_DB:-mdm_lite}"]
      interval: 10s
      timeout: 5s
      retries: 6

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: project_zen-backend
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://mdm:mdm_dev_password@postgres:5432/mdm_lite?schema=public}
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run db:generate -w @project_zen/backend && npm run db:push -w @project_zen/backend && npm run dev -w @project_zen/backend"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: project_zen-frontend
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4000}
    ports:
      - "4001:4001"
    depends_on:
      - backend

volumes:
  postgres_data:
